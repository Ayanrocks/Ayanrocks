<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;800&amp;display=swap');
            .name { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 500; letter-spacing: 1px; fill: #6798c0; }
            .heading { font-family: 'Outfit', sans-serif; font-size: 52px; font-weight: 800; letter-spacing: -1px; fill: #111827; }
        </style>
    </defs>

    <!-- Backgrounds -->
    <rect x="0" y="0" width="550" height="500" fill="#fffdf7" />
    <rect x="550" y="0" width="450" height="500" fill="#6798c0" />

    <!-- Name Header -->
    <line x1="80" y1="100" x2="140" y2="100" stroke="#6798c0" stroke-width="3" />
    <text x="160" y="108" class="name">Ayan Banerjee</text>

    <!-- Main Text -->
    <text x="80" y="180" class="heading">Hi, I'm Ayan,</text>
    <text x="80" y="240" class="heading">your Friendly</text>
    <text x="80" y="300" class="heading">Neighborhood</text>
    <text x="80" y="360" class="heading">Developer.</text>

    <!-- 3D Geometric Art Area (Minimal and Clean) -->
    
    <!-- Left Small Light Blue Cube -->
    <g transform="translate(680, 270) scale(1.1)">
        <path d="M 0 -23 L 40 0 L 0 23 L -40 0 Z" fill="#99d6ea" />
        <path d="M -40 0 L 0 23 L 0 69 L -40 46 Z" fill="#5b86aa" />
        <path d="M 0 23 L 40 0 L 40 46 L 0 69 Z" fill="#4d7494" />
    </g>

    <!-- Right Small Off-White Cube -->
    <g transform="translate(850, 150) scale(1.0)">
        <path d="M 0 -23 L 40 0 L 0 23 L -40 0 Z" fill="#ffffff" />
        <path d="M -40 0 L 0 23 L 0 69 L -40 46 Z" fill="#fffdf7" />
        <path d="M 0 23 L 40 0 L 40 46 L 0 69 Z" fill="#e6e4de" />
    </g>

    <!-- Center Large Gold Cube -->
    <g transform="translate(760, 110) scale(1.6)">
        <path d="M 0 -23 L 40 0 L 0 23 L -40 0 Z" fill="#fdd85d" />
        <path d="M -40 0 L 0 23 L 0 69 L -40 46 Z" fill="#fdc921" />
        <path d="M 0 23 L 40 0 L 40 46 L 0 69 Z" fill="#e0ad0b" />
    </g>

    <!-- Floating Orbs -->
    <circle cx="890" cy="270" r="16" fill="#fdc921" />
    <circle cx="630" cy="110" r="12" fill="#99d6ea" />

</svg>
